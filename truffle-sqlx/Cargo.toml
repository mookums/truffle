[package]
name = "truffle-sqlx"
version = "0.1.0"
edition = "2024"

[dependencies]
sqlx = { version = "0.8", features = [ "runtime-tokio", "tls-rustls-aws-lc-rs", "derive", "migrate", "uuid", "time", "sqlite" ] }
tokio = { version = "1.46.1", features = ["full"] }
truffle-macro = { path = "../truffle-macro" }
